[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route API requests to our Netlify Serverless Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Route all other routes to React Router SPA index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
